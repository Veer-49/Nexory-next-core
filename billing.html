<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - Jupiter Digital Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; padding: 40px 20px; color: #fff; }
        .invoice-box { max-width: 900px; margin: auto; padding: 40px; background: #1e293b; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .table-head { background-color: #374151; border-bottom: 2px solid #4b5563; }
        input, textarea { border: none; background: transparent; width: 100%; outline: none; color: #fff; }
        input:focus, textarea:focus { background-color: #475569; }
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .invoice-box { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
      <h1 class="logo">
        <span>J</span>
        <span>D</span>
        <span>T</span>
      </h1>
    </div>

    <div class="invoice-box">
        <div class="flex justify-between items-start mb-8">
            <!-- Left side - Company Logo -->
            <img src="assets/images/gallery/logo.png" alt="Jupiter Digital Technologies Logo" class="h-16 w-auto">

            <!-- Right side - Invoice Title and Details -->
            <div class="text-right">
                <h1 class="text-4xl font-light text-slate-500 uppercase tracking-widest mb-4">Invoice</h1>
                <div class="grid grid-cols-2 gap-1 text-sm">
                    <span class="text-slate-500 text-left">Invoice no.:</span>
                    <input type="text" value="1" class="text-right font-bold">
                    
                    <span class="text-slate-500 text-left">Invoice date:</span>
                    <input type="text" value="03.08.2026" class="text-right">
                    
                    <span class="text-slate-500 text-left">Due:</span>
                    <input type="text" value="03.23.2026" class="text-right">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-10 mb-10">
            <div>
                <h3 class="font-bold text-white mb-2 uppercase text-xs tracking-wider">From</h3>
                <div class="space-y-1 text-sm text-slate-500">
                    <input type="text" value="Jupiter Digital Technologies" class="font-bold text-white">
                    <input type="text" value="Veer Momaya">
                    <input type="text" value="info@jupiterdigitaltech.com">
                    <input type="text" value="+91 7972278890">
                    <input type="text" value="www.jupiterdigital.tech">
                    <textarea class="h-12">Vasai, Maharashtra India</textarea>
                </div>
            </div>

            <div>
                <div class="mb-6">
                    <h3 class="font-bold text-white mb-2 uppercase text-xs tracking-wider">Bill to</h3>
                    <div class="space-y-1 text-sm text-slate-500">
                        <input type="text" placeholder="[CLIENT NAME]" class="font-bold text-white">
                        <input type="text" placeholder="[E-MAIL]">
                        <input type="text" placeholder="[PHONE]">
                        <textarea placeholder="[ADDRESS]" class="h-12 resize-none"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <table class="w-full mb-8">
            <thead>
                <tr class="table-head text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                    <th class="py-3 px-2 text-left w-2/5">Description</th>
                    <th class="py-3 px-2 text-center">Rate, INR</th>
                    <th class="py-3 px-2 text-center">Tax, %</th>
                    <th class="py-3 px-2 text-center">Disc, %</th>
                    <th class="py-3 px-2 text-right">Amount, INR</th>
                </tr>
            </thead>
            <tbody id="item-body" class="text-sm">
                <tr class="border-b border-slate-600">
                    <td class="py-3 px-2">
                        <select class="w-full">
                            <option value="">Select Service</option>
                            <option>Web Development</option>
                            <option>Android App Development</option>
                            <option>iOS App Development</option>
                            <option>AI Integration</option>
                            <option>Digital Marketing</option>
                            <option>E-Commerce</option>
                            <option>Payment Integration</option>
                            <option>CMS Web Development</option>
                            <option>Email Automation</option>
                            <option>Web Design</option>
                            <option>SEO Development</option>
                        </select>
                    </td>
                    <td class="py-3 px-2 text-center"><input type="number" class="text-center rate" value="0"></td>
                    <td class="py-3 px-2 text-center"><input type="number" class="text-center tax" value="18"></td>
                    <td class="py-3 px-2 text-center"><input type="number" class="text-center disc" value="0"></td>
                    <td class="py-3 px-2 text-right font-semibold row-total">0.00</td>
                </tr>
            </tbody>
        </table>

        <button onclick="addItem()" class="no-print bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 transition mb-8">
            + Add Service Item
        </button>

        <div class="grid grid-cols-2 gap-10">
            <div>
                <h4 class="font-bold text-sm mb-2">Payment instruction</h4>
                <textarea class="text-sm text-slate-500 h-24 border border-slate-600 p-2 rounded bg-slate-800">We accept payments through:&#10;- UPI&#10;- Bank Transfer&#10;- Credit/Debit Card&#10;- Google Pay (GPay)&#10;- Paytm&#10;- PhonePe&#10;&#10;Transfer details:&#10;Bank Name&#10;Account: 0000 0000 0000&#10;IFSC: ABCD0123456</textarea>
                
                <h4 class="font-bold text-sm mt-6 mb-2">Notes:</h4>
                <textarea class="text-sm text-slate-500 h-20 bg-transparent border-none" placeholder="Add any extra notes here..."></textarea>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Subtotal, INR:</span>
                    <span id="subtotal">0.00</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Discount, INR:</span>
                    <span id="total-discount" class="text-red-500">0.00</span>
                </div>
                <div class="flex justify-between text-lg font-bold border-t border-slate-600 pt-2 text-white">
                    <span>Total, INR:</span>
                    <span id="grand-total">0.00</span>
                </div>
                <div class="flex justify-between text-sm text-slate-500">
                    <span>Amount paid, INR:</span>
                    <input type="number" id="paid" value="0" class="text-right w-20 bg-slate-800" oninput="calculate()">
                </div>
                <div class="flex justify-between font-bold text-blue-600 bg-blue-50 p-2 rounded">
                    <span>Balance Due, INR:</span>
                    <span id="balance-due">0.00</span>
                </div>
            </div>
        </div>

        <div class="flex justify-center mt-20 text-center">
            
            <div class="w-64">
                <img src="assets/images/gallery/signature.png" alt="Signature" class="h-12 mx-auto">
                <div class="border-t border-slate-500 mt-2 pt-2">
                    <p class="text-xs text-slate-500 uppercase">Business signature</p>
                    <input type="text" value="Veer Momaya" class="text-center text-sm font-bold mt-2">
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-[900px] mx-auto mt-6 text-center no-print">
        <button onclick="window.print()" class="bg-slate-900 text-white px-10 py-3 rounded-lg font-bold hover:scale-105 transition shadow-lg">
            Print / Save as PDF
        </button>
    </div>

    <script>
        function addItem() {
            const tbody = document.getElementById('item-body');
            const newRow = document.createElement('tr');
            newRow.className = "border-b border-slate-600";
            newRow.innerHTML = `
                <td class="py-3 px-2">
                    <select class="w-full">
                        <option value="">Select Service</option>
                        <option>Web Development</option>
                        <option>Android App Development</option>
                        <option>iOS App Development</option>
                        <option>AI Integration</option>
                        <option>Digital Marketing</option>
                        <option>E-Commerce</option>
                        <option>Payment Integration</option>
                        <option>CMS Web Development</option>
                        <option>Email Automation</option>
                        <option>Web Design</option>
                        <option>SEO Development</option>
                    </select>
                </td>
                <td class="py-3 px-2 text-center"><input type="number" class="text-center rate" value="0"></td>
                <td class="py-3 px-2 text-center"><input type="number" class="text-center tax" value="18"></td>
                <td class="py-3 px-2 text-center"><input type="number" class="text-center disc" value="0"></td>
                <td class="py-3 px-2 text-right font-semibold row-total">0.00</td>
            `;
            tbody.appendChild(newRow);
        }

        function calculate() {
            let subtotal = 0;
            let totalTax = 0;
            let totalDisc = 0;

            document.querySelectorAll('#item-body tr').forEach(row => {
                const rate = parseFloat(row.querySelector('.rate').value) || 0;
                const qty = 1; // Implicit quantity of 1
                const taxPercent = parseFloat(row.querySelector('.tax').value) || 0;
                const discPercent = parseFloat(row.querySelector('.disc').value) || 0;

                const baseAmount = rate * qty;
                const discountVal = baseAmount * (discPercent / 100);
                const taxVal = (baseAmount - discountVal) * (taxPercent / 100);
                const finalRowAmount = baseAmount - discountVal + taxVal;

                row.querySelector('.row-total').innerText = finalRowAmount.toFixed(2);
                
                subtotal += baseAmount;
                totalDisc += discountVal;
                totalTax += taxVal;
            });

            const paid = parseFloat(document.getElementById('paid').value) || 0;
            const grandTotal = subtotal - totalDisc;
            const balanceDue = grandTotal - paid;

            document.getElementById('subtotal').innerText = subtotal.toFixed(2);
            document.getElementById('total-discount').innerText = totalDisc.toFixed(2);
            document.getElementById('grand-total').innerText = grandTotal.toFixed(2);
            document.getElementById('balance-due').innerText = balanceDue.toFixed(2);
        }

        // Auto-calc on input
        document.addEventListener('input', calculate);
        window.onload = calculate;
    </script>
    
    <!-- Include ogency.js for loader functionality -->
    <script src="assets/js/ogency.js"></script>
</body>
</html>
